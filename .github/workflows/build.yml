name: Flutter Build APK
on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch'
        required: true
      build_mode:
        default: 'release'
      app_name:
        default: 'my_flutter_app'
      display_name:
        default: ''
      target_platform:
        default: 'android-arm64'
      clean_build:
        default: 'true'
      admob_id:
        default: ''
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch }}
          fetch-depth: 1
      - uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            /opt/hostedtoolcache/flutter
          key: flutter-gradle-${{ runner.os }}-stable
          restore-keys: flutter-gradle-${{ runner.os }}-
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true
      - name: Build APK
        run: |
          APP="${{ github.event.inputs.app_name }}"
          MODE="${{ github.event.inputs.build_mode }}"
          DISPLAY_NAME="${{ github.event.inputs.display_name }}"
          TARGET="${{ github.event.inputs.target_platform }}"
          DO_CLEAN="${{ github.event.inputs.clean_build }}"
          ADMOB_ID="${{ github.event.inputs.admob_id }}"
          [ -z "$DISPLAY_NAME" ] && DISPLAY_NAME="$APP"
          [ -z "$TARGET" ] && TARGET="android-arm64"
          flutter create --org com.example --project-name $APP /tmp/build_app
          cp -r lib/. /tmp/build_app/lib/
          [ -d "assets" ] && mkdir -p /tmp/build_app/assets && cp -r assets/. /tmp/build_app/assets/
          [ -d "fonts" ] && mkdir -p /tmp/build_app/fonts && cp -r fonts/. /tmp/build_app/fonts/
          cp pubspec.yaml /tmp/build_app/pubspec.yaml
          sed -i "s/^name: .*/name: $APP/" /tmp/build_app/pubspec.yaml
          for AFILE in android/app/build.gradle android/build.gradle android/gradle.properties android/build.gradle.kts android/app/build.gradle.kts android/settings.gradle android/settings.gradle.kts android/app/google-services.json google-services.json android/app/src/main/res/values/strings.xml android/app/src/main/res/values/styles.xml android/app/src/main/res/values/colors.xml android/app/src/main/res/xml/network_security_config.xml; do
            [ -f "$AFILE" ] && mkdir -p "/tmp/build_app/$(dirname $AFILE)" && cp "$AFILE" "/tmp/build_app/$AFILE"
          done
          find android \( -name "MainActivity.kt" -o -name "MainActivity.java" \) 2>/dev/null | while read f; do
            mkdir -p "/tmp/build_app/$(dirname $f)" && cp "$f" "/tmp/build_app/$f"
          done
          if [ -d "android/app/src/main/res" ]; then
            find android/app/src/main/res \( -name "*.xml" -o -name "*.png" -o -name "*.webp" \) 2>/dev/null | while read f; do
              mkdir -p "/tmp/build_app/$(dirname $f)" && cp "$f" "/tmp/build_app/$f"
            done
          fi
          [ -f "pubspec.lock" ] && cp pubspec.lock /tmp/build_app/pubspec.lock
          SRC="android/app/src/main/AndroidManifest.xml"
          DST="/tmp/build_app/android/app/src/main/AndroidManifest.xml"
          if [ -f "$SRC" ]; then
            grep -o '<meta-data[^/]*/>' "$SRC" 2>/dev/null | while IFS= read -r mtag; do
              awk -v tag="$mtag" '{if(/\/application>/)print "        "tag; print}' "$DST" > /tmp/mf_tmp && mv /tmp/mf_tmp "$DST"
            done
          fi
          sed -i 's|android:label="[^"]*"|android:label="@string/app_name"|g' "$DST"
          echo '<resources><string name="app_name">'"$DISPLAY_NAME"'</string></resources>' > "/tmp/build_app/android/app/src/main/res/values/strings.xml"
          if [ -n "$ADMOB_ID" ]; then
            if grep -q "com.google.android.gms.ads.APPLICATION_ID" "$DST" 2>/dev/null; then
              sed -i "s|android:name=\"com.google.android.gms.ads.APPLICATION_ID\" android:value=\"[^\"]*\"|android:name=\"com.google.android.gms.ads.APPLICATION_ID\" android:value=\"$ADMOB_ID\"|g" "$DST"
            else
              awk -v id="$ADMOB_ID" '{if(/\/application>/)print "        <meta-data android:name=\"com.google.android.gms.ads.APPLICATION_ID\" android:value=\""id"\"\/>"; print}' "$DST" > /tmp/mf_tmp && mv /tmp/mf_tmp "$DST"
            fi
            echo "AdMob ID injected: $ADMOB_ID"
          fi
          cd /tmp/build_app
          [ "$DO_CLEAN" != "false" ] && flutter clean
          flutter pub get
          find android -name 'build.gradle' | while read f; do
            sed -i 's/compileSdkVersion flutter.compileSdkVersion/compileSdkVersion 36/g' "$f"
            sed -i 's/compileSdk = flutter.compileSdkVersion/compileSdk = 36/g' "$f"
            sed -i 's/compileSdkVersion [0-9][0-9]*/compileSdkVersion 36/g' "$f"
            sed -i 's/compileSdk = [0-9][0-9]*/compileSdk = 36/g' "$f"
          done
          find android -name 'build.gradle.kts' | while read f; do
            sed -i 's/compileSdk = flutter.compileSdkVersion/compileSdk = 36/g' "$f"
            sed -i 's/compileSdk = [0-9][0-9]*/compileSdk = 36/g' "$f"
          done
          if [ "$MODE" = "release" ]; then
            flutter build apk --release --target-platform $TARGET --split-debug-info=/tmp/dbg
          elif [ "$MODE" = "profile" ]; then
            flutter build apk --profile --target-platform $TARGET
          else
            flutter build apk --debug --no-shrink --no-tree-shake-icons --target-platform $TARGET
          fi
          mkdir -p $GITHUB_WORKSPACE/build/app/outputs/flutter-apk/
          cp build/app/outputs/flutter-apk/*.apk $GITHUB_WORKSPACE/build/app/outputs/flutter-apk/
      - uses: actions/upload-artifact@v4
        with:
          name: apk
          path: build/app/outputs/flutter-apk/*.apk
          retention-days: 7